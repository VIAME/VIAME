# =============================================================================
# Default Interactive Text Query Service Configuration
#
# This file configures the PerformTextQuery algorithm used by the interactive
# segmentation service for text-based object detection.
#
# The core VIAME distribution does not ship a text-query backend — text query
# is provided by model add-ons (e.g. SAM3). When an add-on that supplies text
# query is installed, it overrides this file with one that points to the
# add-on's interactive_text_query_<backend>.conf.
# =============================================================================

# -- end of file --
