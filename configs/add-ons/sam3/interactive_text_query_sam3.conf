# =============================================================================
# Interactive SAM3 Text Query Service Configuration
#
# This config file sets up the PerformTextQuery algorithm using SAM3 for
# text-based object detection in DIVE. It is loaded (via
# interactive_text_query_default.conf) by the interactive segmentation service.
#
# The SAM3 model is shared with the SegmentViaPoints algorithm via
# SharedSAM3ModelCache when both algorithms are configured with the same
# checkpoint/device, so only one copy of the SAM3 weights resides in GPU
# memory even when text query and point segmentation are both enabled.
# =============================================================================

# -----------------------------------------------------------------------------
# Perform Text Query Algorithm Configuration
# -----------------------------------------------------------------------------
# SAM3 supports text-based detection and segmentation
block perform_text_query
  type = sam3
  sam3:checkpoint = models/sam3.1_weights.pt
  sam3:model_config = models/sam3.1_config.json
  sam3:grounding_model_id = models/sam3_grnd_dino_tiny
  sam3:detection_threshold = 0.3
  sam3:text_threshold = 0.25
  sam3:max_detections = 10
  sam3:iou_threshold = 0.3
endblock

# -- end of file --
