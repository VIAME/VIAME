# =============================================================================
# Title: Train Detector - RF DETR Large 1728x960 RGB
#
# Description: Straight 3-channel RGB baseline for the 1728x960 RF-DETR large
# recipe. It is the control for the two motion-infusion runs: identical model,
# resolution, and every training hyperparameter as the _mot_mim and _mot_opt
# configs -- the ONLY difference is the input channels (plain RGB here, vs the
# double-motion and RGB+optical-flow variants). Keeping the rest matched is what
# lets the three validation curves be compared as a clean channel ablation.
#
# There is no motion/flow augmentation pass, so no augmentation_pipeline is set:
# video inputs fall through to the default extractor (filter_default.pipe), which
# decodes each video once and downsamples at the same 5 fps the motion pipelines
# use, yielding the same frame set as RGB instead of a 3/4-channel augmentation.
# Small boxes are retained for small-fish detection.
#
# Sized for a ~49 GB GPU: micro-batch 8, no gradient accumulation, with AMP (on
# by default). Note batch_size is PER-DEVICE and the LR is not scaled by world
# size, so the global batch on a 4-GPU node is 32 -- see the batch_size block.
# The network input is 1728x960 (height 960, width 1728): a near-16:9 shape that
# preserves the aspect ratio of the source footage instead of squashing it into a
# square. Both dims are divisible by the large model's patch_size*num_windows =
# 32 constraint (54 x 30 blocks).
# =============================================================================

include common_train_detector.conf

#  Pipeline template file. Plain RGB deploy template (no motion/flow infusion).
relativepath pipeline_template = templates/embedded_default.pipe

#  Override default validation percentage
default_percent_validation = 0.10

#  Longer validation bursts than the shared default, matched to the motion runs
#  so the train/val split lands on the same frames: 500 frames (~17s at 30fps)
#  per burst decorrelates each validation burst from the training footage around
#  it, instead of the default 10-frame slivers that score memorization on 30fps
#  video.
validation_burst_frame_count = 500

#  Augmentatation cache.
augmentation_cache = augmented_images

#  Do not regenerate cache.
regenerate_cache = true


#  Algorithm to use for 'detector_trainer'.
detector_trainer:type = ocv_windowed

block detector_trainer:ocv_windowed

  # Directory for all files used in training
  train_directory = deep_training

  # Windowing mode, can be disabled, maintain_ar, scale, chip, adaptive
  mode = disabled

  # Chip geometry, unused while mode = disabled (the full frame is passed through
  # and RF-DETR does the resize). Kept aligned with the network input shape.
  chip_width = 1728
  chip_width_step = 1152

  chip_height = 960
  chip_height_step = 640

  # Adaptive size threshold for chipping
  chip_adaptive_thresh = 1600000

  # Keep small boxes -- small fish are the target, so do not filter or remove
  # small detections during training.
  min_train_box_length = 1
  #small_box_area = 200
  #small_action = remove

  # Image reader type
  image_reader:type = vxl

endblock

block detector_trainer:ocv_windowed:trainer

  # Trainer type
  type = rf_detr

  # The model variant (base, large, small, medium, nano)
  rf_detr:model_size = large

  # Plain RGB: num_channels defaults to 3, so it is left unset (matching the
  # 3-channel MIM config). This is the only structural difference from the
  # motion runs, which append motion/flow channels.

  # Device to train on (auto, cpu, cuda, cuda:N)
  rf_detr:device = auto

  # Network input resolution, as HEIGHTxWIDTH. Both dims must be divisible by 32
  # for the large model. A non-square value feeds the network aspect-preserving
  # imagery; RF-DETR resizes to exactly this shape (no windowing, no black bars).
  rf_detr:resolution = 960x1728

  # Augmentation preset. "default" is RF-DETR's built-in (horizontal flip + the
  # DETR multi-scale resize) -- crucially NO vertical flip, which is correct for
  # this up-is-up footage. Do NOT switch to the "aggressive"/"aerial" presets:
  # both add a vertical flip and manufacture upside-down fish the model never
  # sees at inference. "conservative"/"industrial" add mild photometric jitter
  # (also no vertical flip) if a stronger baseline is wanted; the motion runs get
  # their photometric aug through the motion_* presets, which are RGBA-only.
  rf_detr:augmentation = default

  # Path to seed weights. Leave empty to fine-tune from RF-DETR's default
  # COCO-pretrained weights.
  rf_detr:seed_model =

  # BOTH of these are PER-DEVICE, and the learning rate is never scaled by world
  # size, so the global batch the LR actually sees is
  #     batch_size * grad_accum_steps * num_gpus
  # On the 4-GPU node that is 8 * 1 * 4 = 32. grad_accum is 1 deliberately: with
  # accumulation the optimizer-step count per epoch collapses, and step count is
  # what this model is short of, not batch size.
  rf_detr:batch_size = 8
  rf_detr:grad_accum_steps = 1

  # Matched to the motion configs so the three runs differ only in their channels,
  # not in their tuning. Deliberately short for a fast first pass; cosine anneals
  # to 0 across it.
  rf_detr:max_epochs = 20

  # Scaled from RF-DETR's tuned 1e-4/1.5e-4 (which assume a global batch of 16) to
  # the global batch of 32 above. sqrt scaling, not linear: DETR training is
  # unstable at high LR.
  rf_detr:learning_rate = 1.5e-4
  rf_detr:learning_rate_encoder = 2e-4

  # The head is re-initialized to a single class, so the first few hundred steps
  # push large gradients through a mostly-pretrained network. Ramp in.
  rf_detr:warmup_epochs = 0.25

  # LR schedule. The default "step" schedule drops at lr_drop = 100, which never
  # fires in a run this length. Cosine anneals to 0 across max_epochs.
  rf_detr:lr_scheduler = cosine

  # EMA decay is applied per optimizer step, so the averaging horizon is
  # ~1/(1-decay) steps. Matched to the motion runs.
  rf_detr:use_ema = True
  rf_detr:ema_decay = 0.9998

  # Checkpointing
  rf_detr:checkpoint_interval = 5

  # Host-memory budget. 3-channel RGB decodes lighter than the 4-channel flow
  # cache, so the motion runs' worker count is a safe baseline here. Every DDP
  # rank forks num_workers loader processes; keep persistent_workers off so the
  # validation workers are reaped between epochs.
  rf_detr:num_workers = 4
  rf_detr:pin_memory = True
  rf_detr:persistent_workers = False
  rf_detr:prefetch_factor = 2

  # Bound validation to a deterministic subsample, matched to the motion runs so
  # the model-selection signal is comparable. Run a full eval on the final best
  # checkpoint for a headline number.
  rf_detr:val_subsample = 4000
  rf_detr:eval_max_dets = 300

  # Max timeout in seconds (default = 1209600, or two weeks)
  rf_detr:timeout = 1209600

endblock
