# =============================================================================
# Title: Warm-restart RF DETR Seg Large at the INITIAL LR (constant 1e-4)
#
# Continue training a prior run's best checkpoint for a few more epochs at the
# initial learning rate (1e-4, constant), to test whether the high-LR phase had
# more headroom (it was still improving monotonically when the schedule stepped
# the LR down). Same data/chips/categories as the seeding run (reuse_cache).
# Differs from train_detector_sealion_rf_detr_l_1024_chip.conf only in:
#   * seed_model    -> initialize from a prior run's best checkpoint.
#   * lr_drop = 1000 -> LR never steps within this short run (constant 1e-4).
#   * warmup_epochs = 0 -> already a trained model.
#   * max_epochs = 8 + early_stopping_patience = 3 -> run a few epochs at 1e-4
#                       and stop early if it stops improving (a warm restart at
#                       high LR may dip first, then recover).
# Set rf_detr:seed_model to the best checkpoint before running.
# =============================================================================

include common_train_detector.conf

relativepath pipeline_template = templates/embedded_default.pipe
default_percent_validation = 0.30
augmentation_cache = augmented_images
regenerate_cache = true
hard_negative_categories = negative

detector_trainer:type = ocv_windowed

block detector_trainer:ocv_windowed
  train_directory = deep_training
  mode = chip
  chip_width = 1024
  chip_width_step = 896
  chip_height = 1024
  chip_height_step = 896
  chip_adaptive_thresh = 1600000
  min_train_box_length = 1
  chip_format = jpg
  chips_w_gt_only = true
  background_chip_ratio = 0.10
  reuse_cache = true
  chip_threads = 12
  image_reader:type = ocv
endblock

block detector_trainer:ocv_windowed:trainer
  type = rf_detr
  rf_detr:model_size = large
  rf_detr:segmentation = true
  rf_detr:multi_scale = False
  rf_detr:device = auto
  rf_detr:devices = 4
  rf_detr:resolution = 1008
  rf_detr:gradient_checkpointing = False

  # Initialize from the seeding run's best checkpoint (set before running).
  rf_detr:seed_model =

  rf_detr:batch_size = 1
  rf_detr:grad_accum_steps = 4
  rf_detr:max_epochs = 8

  rf_detr:max_mask_instances = 64
  rf_detr:num_workers = 4
  rf_detr:pin_memory = True
  rf_detr:persistent_workers = True
  rf_detr:prefetch_factor = 4

  rf_detr:val_subsample = 4000
  rf_detr:eval_interval = 1
  rf_detr:eval_max_dets = 300

  # Constant initial LR: multistep with a drop interval larger than the run so
  # the LR never steps (stays 1e-4 for all epochs here).
  rf_detr:learning_rate = 1e-4
  rf_detr:learning_rate_encoder = 1.5e-4
  rf_detr:lr_scheduler = multistep
  rf_detr:lr_drop = 1000
  rf_detr:warmup_epochs = 0.0
  rf_detr:early_stopping = False
  rf_detr:early_stopping_patience = 3

  rf_detr:use_ema = True
  rf_detr:ema_decay = 0.993
  rf_detr:checkpoint_interval = 10
  rf_detr:timeout = 1209600
endblock
