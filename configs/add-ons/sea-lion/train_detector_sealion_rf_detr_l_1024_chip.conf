# =============================================================================
# Title: Train Detector - RF DETR Seg Large (masks), 1024px chips, 4-GPU DDP
#
# Description: Canonical Sea Lion training config. Trains RFDETRSegLarge (mask
# head) on 1024px disk chips of the high-resolution imagery, across 4 GPUs with
# DDP. This file is the reproducible source of every training parameter — no
# hidden env vars; the mask-instance cap is the rf_detr:max_mask_instances key
# below. Drives masks, multi-GPU, stepped LR + early stopping, the dataloader
# tuning, and the validation-cost controls.
#
# Key choices (see inline comments):
#   * segmentation = true     -> RFDETRSegLarge; chip polygons -> COCO masks.
#   * resolution   = 1008     -> seg-large needs resolution divisible by 24
#                                (1024 is not; 1008 = 24*42, ~1.6% resize).
#   * batch_size   = 1        -> seg can't batch >1 (validation mask-size
#                                mismatch). 1 x grad_accum 4 x 4 GPUs = eff 16.
#   * gradient_checkpointing = false -> fits ~16 GB at batch 1, ~faster.
#   * max_mask_instances = 64 -> bounds the mask loss on dense colony chips.
#   * val_subsample = 4000 + eval_max_dets = 300 -> validation ~13 min (the
#                                forward over all 21k chips at batch 1 dominates).
# =============================================================================

include common_train_detector.conf

#  Pipeline template file.
relativepath pipeline_template = templates/embedded_default.pipe

#  Override default validation percentage (explicit train/vali dirs override it).
default_percent_validation = 0.30

#  Augmentatation cache.
augmentation_cache = augmented_images

#  Do not regenerate cache.
regenerate_cache = true

#  Hard-negative class: kept for tiling, excluded from output labels.
hard_negative_categories = negative


#  Algorithm to use for 'detector_trainer'.
detector_trainer:type = ocv_windowed

block detector_trainer:ocv_windowed

  # Directory for all files used in training
  train_directory = deep_training

  # Windowing mode, can be disabled, maintain_ar, scale, chip, adaptive
  mode = chip

  # Chip tile size on disk (and step / overlap).
  chip_width = 1024
  chip_width_step = 896
  chip_height = 1024
  chip_height_step = 896

  # Adaptive size threshold for chipping
  chip_adaptive_thresh = 1600000

  # Keep small boxes: high-res training exists to learn small objects.
  min_train_box_length = 1

  # Write chips as JPEG: PNG tiles for the full set overflow the disk (~700GB).
  chip_format = jpg

  # Only emit tiles with an annotation (object or hard negative).
  chips_w_gt_only = true

  # Plus ~10% random background tiles, relative to annotated tiles.
  background_chip_ratio = 0.10

  # Reuse cached tiles on re-runs. Manifests persist polygons too. NOTE: the
  # cache is NOT invalidated by annotation edits — clear deep_training before a
  # re-run after the annotations change.
  reuse_cache = true

  # Parallel chip generation (the 4-GPU job allocates 20 CPUs).
  chip_threads = 12

  # Image reader type
  image_reader:type = ocv

endblock

block detector_trainer:ocv_windowed:trainer

  # Trainer type
  type = rf_detr

  # Model variant (base, large, small, medium, nano).
  rf_detr:model_size = large

  # Train the segmentation (mask) head: RFDETRSegLarge.
  rf_detr:segmentation = true

  # Off for seg: jittering the resolution up raises peak memory / risks OOM.
  rf_detr:multi_scale = False

  # Device to train on (auto, cpu, cuda, cuda:N)
  rf_detr:device = auto

  # All 4 GPUs with DDP (subprocess launcher); strategy defaults to
  # ddp_find_unused_parameters_true.
  rf_detr:devices = 4

  # Network input resolution. Must be divisible by 24 for seg-large; 1008 stays
  # close to the 1024 chip size while keeping high resolution.
  rf_detr:resolution = 1008

  # Off: batch 1 + the mask-instance cap fit in ~16 GB of the 24 GB GPUs, and
  # skipping activation recompute is faster. Set True only if a denser dataset
  # or higher resolution OOMs.
  rf_detr:gradient_checkpointing = False

  # Path to pretrained weights (empty -> RFDETRSegLarge published weights).
  rf_detr:seed_model =

  # Fixed micro-batch (NOT auto, so every DDP rank takes the same steps).
  # batch_size>1 is unusable for seg (validation can't batch differing mask
  # sizes). 1 x grad_accum 4 x 4 GPUs = global effective batch 16.
  rf_detr:batch_size = 1
  rf_detr:grad_accum_steps = 4
  rf_detr:max_epochs = 50

  # Cap matched instances per chip used by the MASK loss (box/class losses use
  # all objects). The mask loss allocates per-instance tensors and OOMs on dense
  # colony chips; this is what lets 1024px chips fit on 24 GB GPUs.
  rf_detr:max_mask_instances = 64

  # DataLoader throughput (seg augments on the CPU). ~4 workers/GPU given the
  # 20 CPUs the 4-GPU job allocates. Accuracy-neutral.
  rf_detr:num_workers = 4
  rf_detr:pin_memory = True
  rf_detr:persistent_workers = True
  rf_detr:prefetch_factor = 4

  # Validation cost. Forward-passing all ~21k vali chips at batch 1 dominates
  # (~50 min); a deterministic ~4k-chip subsample is ~10 min and a stable
  # selection signal. Validate every epoch; cap scored detections. (Run a full
  # eval on the final best checkpoint for the headline mAP. faster_coco_eval,
  # installed with RF-DETR, keeps the scoring itself fast.)
  rf_detr:val_subsample = 4000
  rf_detr:eval_interval = 1
  rf_detr:eval_max_dets = 300

  # Stepped LR decay + early stopping. Cosine over 50 epochs barely dropped the
  # LR before the model peaked (~epoch 3) and plateaued, so we step instead:
  # multistep drops the LR 10x every lr_drop epochs (1e-4 epochs 0-3, 1e-5 4-7,
  # 1e-6 8-11, ...). Early stopping halts once val mAP plateaus.
  rf_detr:lr_scheduler = multistep
  rf_detr:lr_drop = 4
  rf_detr:warmup_epochs = 1.0
  rf_detr:early_stopping = True
  rf_detr:early_stopping_patience = 8

  # Training learning rate
  rf_detr:learning_rate = 1e-4
  rf_detr:learning_rate_encoder = 1.5e-4

  # EMA settings
  rf_detr:use_ema = True
  rf_detr:ema_decay = 0.993

  # Checkpointing
  rf_detr:checkpoint_interval = 10

  # Max timeout in seconds (default = 1209600, or two weeks)
  rf_detr:timeout = 1209600

endblock
