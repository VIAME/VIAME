# =============================================================================
# Title: Training - Reclassifier NETHARN Sea Lion
#
# Description: Configuration for training a netharn detection reclassifier
# (EfficientNetV2-M) that refines an initial detector's predictions into
# per-class labels and learns a "background" class from the detector's false
# positives.
# =============================================================================

#  Image reader for checking bit depth and loading samples (required; without
#  it viame_train_detector aborts with "Invalid image reader type specified").
image_reader:type = vxl

#  Groundtruth file extensions (txt, kw18, etc...). Note: this is indepedent of
#  the format that's stored in the file. Includes .json so a kwcoco groundtruth
#  (e.g. the shared train/vali split used by the detector training) is read.
groundtruth_extensions = .csv;.json;.kw18

#  Algorithm to use for 'groundtruth_reader'. "auto" detects VIAME CSV as well
#  as kwcoco/COCO JSON and kw18.
groundtruth_reader:type = auto

#  Dump possible input data formatting warnings to these files
data_warning_file = TRAINING_DATA_WARNINGS.txt
groundtruth_reader:auto:viame_csv:warning_file = TRAINING_DATA_WARNINGS.txt

#  Can be either: "one_per_file" or "one_per_folder".
groundtruth_style = one_per_folder

#  Semicolon list of seperated image extensions to use in training, images
#  without this extension will not be included.
image_extensions = .jpg;.jpeg;.JPG;.JPEG;.tif;.tiff;.TIF;.TIFF;.png;.PNG;.sgi;.SGI;.bmp;.BMP;.pgm;.PGM

#  Semicolon list of seperated video extensions to use in training, videos
#  without this extension will not be included.
video_extensions = .mp4;.MP4;.mpg;.MPG;.mpeg;.MPEG;.avi;.AVI;.wmv;.WMV;.mov;.MOV;.webm;.WEBM;.ogg;.OGG

#  Pipeline to use to extract video frames if inputs are videos
relativepath video_extractor = filter_default.pipe

#  Percent [0.0, 1.0] of validation samples to use if no manual files specified.
default_percent_validation = 0.10

#  Number of validation frames to group together in one test burst
validation_burst_frame_count = 10

#  Augmentation pipeline.
#relativepath augmentation_pipeline = train_aug_hue_shifting_only.pipe

#  Augmentatation cache.
#augmentation_cache = augmented_images

#  Do not regenerate cache.
#regenerate_cache = true


#  Algorithm to use for 'detector_trainer'.
detector_trainer:type = netharn

block detector_trainer:netharn

  # Training a frame classifier not a detector
  mode = detection_refiner

  # Model identifier
  identifier = viame-detection-refiner

  # Network architecture. Options wired in clf_fit.py: resnet50, resnext101,
  # efficientnetv2s, efficientnetv2m, convnextsmall, swinv2tiny.
  arch = efficientnetv2m

  # Number of GPUs to use, -1 indicates all
  gpu_count = -1

  # Network perspective field size / fixed chip window (see chip_method below).
  chip_width = 224
  chip_height = 224

  # Chip extraction method. fixed_width cuts a fixed chip_width x chip_height
  # window centered on the annotation center, out of the GSD-normalized frame
  # (scale_type_file), so each class appears at its normalized pixel size inside
  # the chip and object size stays a learnable cue. The default use_box crops the
  # tight box and letterbox-resizes it to fill the input, which rescales every
  # object to the same size and cancels the GSD normalization -- prefer
  # fixed_width whenever scale_type_file is set.
  chip_method = fixed_width

  # Max epoch count
  max_epochs = 100

  # Train only on images with ground truth
  gt_frames_only = false

  # Backbone (ImageNet) seed weights, matched to arch above.
  relativepath backbone = models/pytorch_efficientnet_v2_m.pth

  # Pipeline template file.
  relativepath pipeline_template = templates/embedded_generic_netharn.pipe

  # Pivot area, asserts minimum size bound
  area_lower_bound = 500

  # Ignore entries near border
  border_exclude = 1

  # Max timeout in seconds
  timeout = 1209600

  # Image train batch size
  batch_size = auto

  # Training learning rate
  learning_rate = auto

  # Augmentation method
  augmentation = complex

  # Random zoom-out jitter on the sampled window during augmentation (fraction of
  # window size; 0 disables). The default 0.2 only ever grows the window, i.e. it
  # only shrinks the object, so it is asymmetric and works against the precise
  # per-class object size that fixed_width + scale_type_file establishes -- keep
  # it at 0 when relying on GSD normalization.
  scale_jitter = 0.0

  # Detection model for background sampling and box refinement. Alternatives to
  # this single netharn model:
  #   * detector_type = <type> + detector_config = key=val;key=val   (simple case)
  #   * detector_config_file = path/to/detector.conf                 (full spec)
  # The latter takes a standalone .conf with a "detector:*" nested-algorithm
  # block and can wrap any detector, e.g. a windowed RF-DETR for hard-negative
  # mining.
  relativepath detector_model = models/sea_lion_v3_cfrnn_two_class.zip

  # Class assigned to the detector's mined false positives. Ground-truth boxes
  # whose category is not in the training label set (e.g. "negative") are also
  # folded into this class, so pass an 8-class labels file to fold negatives in.
  negative_category = background

  # Maximum number of background samples per frame or random downsampling factor
  max_neg_per_frame = 100

  # Scale file for automatically determining scene scale
  relativepath scale_type_file = models/sea_lion_v3_target_scales.txt

endblock
