# =============================================================================
# Title: Train Detector - RF DETR Large 728 Motion (MIM)
#
# Description: Configuration for training RF-DETR with motion-image-method (MIM)
# infusion. Uses the RF-DETR large model at 728px -- the large variant's high-
# resolution feature scale (P3) and larger input aid small-object recall.
# Training imagery is augmented with two temporal-variance motion channels
# (train_aug_add_double_motion) and the detector is deployed with the matching
# motion-infusion template. Small boxes are retained for small-fish detection.
# Requires temporally ordered input frames.
# =============================================================================

include common_train_detector.conf

#  Pipeline template file.
relativepath pipeline_template = templates/embedded_rf_detr_motion.pipe

#  Override default validation percentage
default_percent_validation = 0.30

#  Augmentation pipeline.
relativepath augmentation_pipeline = train_aug_add_double_motion.pipe

#  Augmentatation cache.
augmentation_cache = augmented_images

#  Do not regenerate cache.
regenerate_cache = true


#  Algorithm to use for 'detector_trainer'.
detector_trainer:type = ocv_windowed

block detector_trainer:ocv_windowed

  # Directory for all files used in training
  train_directory = deep_training

  # Windowing mode, can be disabled, maintain_ar, scale, chip, adaptive
  mode = disabled

  # Resized chip width (RF-DETR large default is 728).
  chip_width = 728
  chip_width_step = 485

  # Resized chip height (RF-DETR large default is 728).
  chip_height = 728
  chip_height_step = 485

  # Adaptive size threshold for chipping
  chip_adaptive_thresh = 1600000

  # Keep small boxes -- small fish are the target, so do not filter or remove
  # small detections during training.
  min_train_box_length = 1
  #small_box_area = 200
  #small_action = remove

  # Image reader type
  image_reader:type = vxl

endblock

block detector_trainer:ocv_windowed:trainer

  # Trainer type
  type = rf_detr

  # The model variant (base, large, small, medium, nano)
  rf_detr:model_size = large

  # Device to train on (auto, cpu, cuda, cuda:N)
  rf_detr:device = auto

  # Network perspective field size
  rf_detr:chip_width = 728

  # Augmentation preset. Pegged to geometric (flips only) so RF-DETR's internal
  # photometric augmentation cannot pollute the burned-in motion channels.
  rf_detr:augmentation = geometric

  # Path to seed weights. Leave empty to fine-tune from RF-DETR's default
  # COCO-pretrained weights -- these transfer well even though the motion
  # channels are not true RGB, and beat training from scratch.
  rf_detr:seed_model =

  # Image train batch size
  rf_detr:batch_size = 4
  rf_detr:max_epochs = 50

  # Training learning rate
  rf_detr:learning_rate = 1e-4
  rf_detr:learning_rate_encoder = 1.5e-4

  # Gradient accumulation steps
  rf_detr:grad_accum_steps = 4

  # EMA settings
  rf_detr:use_ema = True
  rf_detr:ema_decay = 0.993

  # Checkpointing
  rf_detr:checkpoint_interval = 10

  # Max timeout in seconds (default = 1209600, or two weeks)
  rf_detr:timeout = 1209600

endblock
