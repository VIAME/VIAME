# =============================================================================
# SAM3 (Segment Anything Model 3) Segmenter Configuration
#
# This file contains shared configuration documentation for SAM3-based
# segmentation pipelines. Include this file in any pipeline that uses SAM3.
#
# Usage: include common_sam3_segmenter.conf
#
# SAM3 is a HuggingFace-style model supporting:
# - Point-based interactive segmentation
# - Box-prompted segmentation
# - Text-based object detection and segmentation (via Grounding DINO)
# - Video object tracking with memory attention
#
# Model files expected in models/ directory:
# - sam3_weights.pt            : Model weights (~3.4GB)
# - sam3_config.json           : Model architecture configuration
# - sam3_processor_config.json : Image/video processor configuration
# - sam3_tokenizer.json        : Text tokenizer (for text queries)
# - sam3_tokenizer_config.json
# - sam3_vocab.json
# - sam3_special_tokens_map.json
#
# All SAM3 parameters are configured inside individual pipeline process
# blocks using the 'block refiner:sam3' or equivalent syntax.
#
# -----------------------------------------------------------------------------
# Default Parameter Reference
# -----------------------------------------------------------------------------
# Device:                     cuda
# Image size:                 1008 (vs SAM2's 1024)
# Mask size:                  288
# Polygon simplification:     0.01 (Douglas-Peucker epsilon relative to perim)
# Max polygon points:         30
# Hole policy:                allow (or "remove" to fill holes)
# Multipolygon policy:        largest (or "allow", "convex_hull")
# Output type:                polygon (or "mask", "both")
# Min mask area:              10 pixels
# Filter by quality:          true
# Adjust boxes:               false
# Detection threshold:        0.3
# Text threshold:             0.25
# Video tracking num_maskmem: 7
# Max tracked objects:        10000
# Track keep-alive:           30 frames
# =============================================================================

# -- end of file --
