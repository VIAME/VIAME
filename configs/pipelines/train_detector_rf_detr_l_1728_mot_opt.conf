# =============================================================================
# Title: Train Detector - RF DETR Large 1728x960 Motion (Optical Flow)
#
# Description: Configuration for training a 4-channel RF-DETR detector with
# optical-flow infusion. Uses the RF-DETR large model at 1728x960 (high-resolution
# P3 feature scale aids small-object recall; the bump from 728 to 1728x960 resolves
# smaller fish on high-resolution imagery). Training imagery is augmented with a
# background-compensated optical-flow magnitude channel appended to RGB
# (train_aug_add_optical_flow -> RGBA), and the detector is deployed with the
# matching optical-flow template. Small boxes are retained for small-fish
# detection. Requires temporally ordered input frames.
#
# For video inputs the frames are extracted and flow-augmented in a single pass
# (train_aug_add_optical_flow) so the video is decoded only once and only
# the augmented images are written to disk.
#
# Sized for a ~49 GB GPU: micro-batch 8, no gradient accumulation, with AMP (on
# by default). Note batch_size is PER-DEVICE and the LR is not scaled by world
# size, so the global batch on a 4-GPU node is 32 -- see the batch_size block.
# The network input is 1728x960 (height 960, width 1728): a
# near-16:9 shape that preserves the aspect ratio of the source footage instead
# of squashing it into a square. It costs the same 1.66M pixels as a 1280x1280
# square, but spends them on real horizontal detail (0.90x downsample from
# 1080p, vs 0.667x for the square) rather than on interpolating the vertical
# axis. Both dims are divisible by the large model's patch_size*num_windows = 32
# constraint (54 x 30 blocks).
# =============================================================================

include common_train_detector.conf

#  Pipeline template file.
relativepath pipeline_template = templates/embedded_rf_detr_optical_flow.pipe

#  Override default validation percentage. Frames from video are highly
#  redundant, so a large split buys no extra signal -- it just removes training
#  data (30% of a ~650k-frame corpus is ~200k frames held out to produce a
#  number that val_subsample then computes from 4k of them anyway).
default_percent_validation = 0.10

#  Validation frames are taken as contiguous bursts, one burst per period of
#  burst_count / percent_validation frames. common_train_detector.conf sets the
#  burst to 10, which suits sparse still imagery but not 30fps video: at 10 the
#  period is 100 frames, so validation is 10-frame slivers lifted out every ~3
#  seconds and every one of them has a near-duplicate in train a fraction of a
#  second away -- the resulting mAP scores memorization. 500 frames (~17s at
#  30fps) per burst decorrelates the two sides; leakage is then confined to the
#  two frames either side of each burst boundary.
validation_burst_frame_count = 500

#  Augmentation pipeline. This is a single-pass, source-driven pipeline: it
#  reads from the common_default_input source, so the same pipeline augments
#  both videos (decoded once, frames extracted and flow-augmented in one pass)
#  and image sequences (via the image_list reader). No separate video-extraction
#  or per-frame augmentation pass is needed.
relativepath augmentation_pipeline = train_aug_add_optical_flow.pipe

#  Augmentatation cache.
augmentation_cache = augmented_images

#  Do not regenerate cache.
regenerate_cache = true


#  Algorithm to use for 'detector_trainer'.
detector_trainer:type = ocv_windowed

block detector_trainer:ocv_windowed

  # Directory for all files used in training
  train_directory = deep_training

  # Windowing mode, can be disabled, maintain_ar, scale, chip, adaptive
  mode = disabled

  # Chip geometry, unused while mode = disabled (the full frame is passed through
  # and RF-DETR does the resize). Kept aligned with the network input shape.
  chip_width = 1728
  chip_width_step = 1152

  chip_height = 960
  chip_height_step = 640

  # Adaptive size threshold for chipping
  chip_adaptive_thresh = 1600000

  # Keep small boxes -- small fish are the target, so do not filter or remove
  # small detections during training.
  min_train_box_length = 1
  #small_box_area = 200
  #small_action = remove

  # Image reader type
  image_reader:type = vxl

endblock

block detector_trainer:ocv_windowed:trainer

  # Trainer type
  type = rf_detr

  # The model variant (base, large, small, medium, nano)
  rf_detr:model_size = large

  # Device to train on (auto, cpu, cuda, cuda:N)
  rf_detr:device = auto

  # Number of input channels. 4 = RGB + optical-flow magnitude. The pretrained
  # input conv is adapted from 3 to 4 channels by RF-DETR's _adapt_input_conv.
  rf_detr:num_channels = 4

  # Network input resolution, as HEIGHTxWIDTH. Both dims must be divisible by 32
  # for the large model. A non-square value feeds the network aspect-preserving
  # imagery; RF-DETR resizes to exactly this shape (no windowing, no black bars).
  rf_detr:resolution = 960x1728

  # Augmentation preset for the [ R, G, B, flow ] layout.
  #
  # Geometry (horizontal flip, mild affine) applies to all four channels; that is
  # safe because the flow channel is undirected -- it stores magnitude, not a
  # (dx, dy) vector a flip would have to negate. No vertical flip: up is up in this
  # footage, and flipping it manufactures upside-down fish that never occur at
  # inference.
  #
  # Brightness, contrast, gamma and colour apply to channels 0-2 ONLY. Albumentations
  # would otherwise hand them all four planes, and an additive offset on a motion
  # magnitude lifts stationary background off true zero -- inventing motion the
  # pipeline never measured.
  #
  # The flow channel instead gets a multiplicative gain jitter (+/-30%, clipped at
  # 255). Multiplication is the one intensity op that is safe on a motion channel,
  # because 0 * k == 0 leaves the background exactly zero. It buys invariance to the
  # absolute flow scale, which is an artifact of ocv_optical_flow's scale = 8.0 and
  # of how fast the fish happened to be swimming, not a property of the fish.
  rf_detr:augmentation = motion_rgb

  # Path to seed weights. Leave empty to fine-tune from RF-DETR's default
  # COCO-pretrained weights -- these transfer well even with the added flow
  # channel, and beat training from scratch.
  rf_detr:seed_model =

  # BOTH of these are PER-DEVICE, and the learning rate is never scaled by world
  # size, so the global batch the LR actually sees is
  #     batch_size * grad_accum_steps * num_gpus
  # On the 4-GPU node that is 8 * 1 * 4 = 32. grad_accum is deliberately 1: with
  # accumulation the step count per epoch collapses (a 460k-frame epoch at an
  # effective batch of 64 is only ~7k optimizer steps), and step count is what
  # this model is short of, not batch size.
  #
  # Micro-batch is sized against the multi_scale peak (1088x1952, 1.28x the
  # 960x1728 base -- that shape, not the base, is where VRAM peaks). Training-step
  # memory is quadratic in micro-batch, not linear: the quadratic term comes from
  # the matcher/loss cost matrices and so scales with objects-per-frame rather
  # than pixels. At 8 that lands ~22 GB on this imagery (~1 fish per frame) and
  # ~47 GB in the pathological 100-objects-per-frame case, so 8 is the largest
  # micro-batch that still fits a 49 GB card under the worst case.
  #
  # Drop to 4 for a 24 GB GPU, or set batch_size = auto to probe the largest
  # micro-batch that fits (the probe is worst-case and will pick conservatively).
  # If you change any of the three factors above, rescale the LR to match.
  rf_detr:batch_size = 8
  rf_detr:grad_accum_steps = 1

  # Specialized to this corpus and deliberately short for a fast first pass. Cosine
  # anneals to 0 across max_epochs, so this is a complete schedule, not a truncated
  # one. Revisit once the augmented run's validation curve shows where it actually
  # plateaus -- the earlier un-augmented, constant-LR run's apparent epoch-3 plateau
  # is not a reliable guide now that augmentation and annealing are in place.
  rf_detr:max_epochs = 20

  # Scaled from RF-DETR's tuned 1e-4/1.5e-4 (which assume a global batch of 16)
  # to the global batch of 32 above. sqrt scaling, not linear: DETR training is
  # unstable at high LR and the extra headroom is not worth a diverged run.
  rf_detr:learning_rate = 1.5e-4
  rf_detr:learning_rate_encoder = 2e-4

  # The detection head is re-initialized to a single class and the input stem is
  # re-derived for the 4th channel, so the first few hundred steps push large
  # gradients through a mostly-pretrained network. Ramp in rather than starting
  # at full LR.
  rf_detr:warmup_epochs = 0.25

  # LR schedule. The default "step" schedule drops the LR at lr_drop = 100, which
  # never fires in a run this length -- the LR would hold at its peak start to
  # finish and never anneal. Cosine decays smoothly to 0 across max_epochs, which
  # only means anything if max_epochs is the real run length: at 50 epochs the LR
  # was still at 86% of peak by epoch 12, which is what the bouncing mAP was.
  rf_detr:lr_scheduler = cosine

  # EMA. decay is applied per optimizer step, so its averaging horizon is
  # ~1/(1-decay) steps -- at 0.993 that is ~140 steps, under 1% of an epoch here,
  # which is smoothing in name only. 0.9998 gives a ~5k-step (~third of an epoch)
  # horizon. The EMA weights already beat the raw ones at every epoch; this gives
  # them a window worth averaging over.
  rf_detr:use_ema = True
  rf_detr:ema_decay = 0.9998

  # Checkpointing
  rf_detr:checkpoint_interval = 5

  # DataLoader throughput. This run is input-bound, not compute-bound: the
  # optical-flow channel is baked into the cached images once, so every epoch is
  # just decoding 4-channel PNGs off disk and running CPU augmentation. At 4
  # workers/GPU the 4 GPUs were starved -- steady-state epochs ran ~3.5x slower
  # than the 3-channel MIM run for a nearly identical model. Raising the decode
  # parallelism is accuracy-neutral and the main speed lever here.
  #
  # num_workers is PER RANK, so 8 on a 4-GPU node forks 32 loader processes;
  # size --cpus-per-task to match (~36-40) or the workers just contend. Host RAM,
  # not VRAM, is the ceiling: each of those 32 processes holds its own COCO index
  # plus prefetch_factor * batch_size decoded 4-channel frames in flight. If a
  # rank is SIGKILLed (host OOM, not a CUDA OOM), dial num_workers back to 6.
  # persistent_workers stays off so the train workers are reaped before the
  # validation workers spawn -- with 32 workers, keeping both sets alive at the
  # train/val boundary is what would blow the RAM budget.
  rf_detr:num_workers = 8
  rf_detr:pin_memory = True
  rf_detr:persistent_workers = False
  rf_detr:prefetch_factor = 3

  # Bound validation. Even at default_percent_validation = 0.10 a large corpus yields
  # a six-figure validation set, and the COCO evaluator holds up to eval_max_dets
  # detections per image in host RAM before accumulating. A deterministic
  # subsample gives the same model-selection signal at a fixed cost; run a full
  # eval on the final best checkpoint for a headline number.
  rf_detr:val_subsample = 4000
  rf_detr:eval_max_dets = 300

  # Max timeout in seconds (default = 1209600, or two weeks)
  rf_detr:timeout = 1209600

endblock
