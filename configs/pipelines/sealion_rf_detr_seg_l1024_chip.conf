# =============================================================================
# Title: Train Detector - RF DETR Seg Large (masks), 1024px chips, multi-GPU
#
# Description: Trains the RF-DETR *segmentation* large model (RFDETRSegLarge,
# mask head) on 1024px disk chips of high-resolution imagery, across all
# visible GPUs with DDP. Built for the Sea Lion dataset.
#
# Differences from the box-only sealion_rf_detr_l1024_chip.conf:
#   * segmentation = true     -> RFDETRSegLarge, polygons -> COCO masks.
#   * resolution   = 1008     -> seg-large needs resolution divisible by
#                                patch_size*num_windows = 12*2 = 24
#                                (1024 is not; 1008 = 24*42 is, ~1.6% resize).
#   * devices      = 4        -> DDP across 4 GPUs (launched in a subprocess).
#   * fixed batch_size = 1    -> seg + masks at 1008px needs batch 1 on 24 GB;
#                                identical micro-batch on every rank ("auto"
#                                probing can differ per rank -> NCCL deadlock).
#                                1 x grad_accum 4 x 4 GPUs = effective batch 16.
#   * lr_scheduler = cosine + early_stopping -> anneal LR and stop on plateau,
#                                fixing the constant-LR overfit of the last run.
#   * gradient_checkpointing = false -> fits in ~16 GB at batch 1, ~33%% faster.
#   * multi_scale = false     -> seg+masks are memory-heavy; jittering the
#                                resolution up risks OOM. Train at a fixed 1008.
#
# The polygons must be present in the input groundtruth (segmentation field);
# the ocv_windowed trainer now translates/clips them onto each chip and the
# rf_detr trainer writes them to the COCO segmentation field.
#
# MEMORY: the RF-DETR mask loss allocates per-matched-instance tensors, so it
# OOMs on dense colony chips (hundreds of animals) regardless of resolution or
# batch size. run_train.sh sets RFDETR_MAX_MASK_INSTANCES=64, which caps the
# instances used for the mask loss per chip (box/class losses use all objects).
# This is what makes 1024px chips fit on 24 GB GPUs.
# =============================================================================

include common_train_detector.conf

#  Pipeline template file.
relativepath pipeline_template = templates/embedded_default.pipe

#  Override default validation percentage
default_percent_validation = 0.30

#  Augmentatation cache.
augmentation_cache = augmented_images

#  Do not regenerate cache.
regenerate_cache = true

#  Hard-negative class: kept for tiling, excluded from output labels.
hard_negative_categories = negative


#  Algorithm to use for 'detector_trainer'.
detector_trainer:type = ocv_windowed

block detector_trainer:ocv_windowed

  # Directory for all files used in training
  train_directory = deep_training

  # Windowing mode, can be disabled, maintain_ar, scale, chip, adaptive
  mode = chip

  # Resized image fed to the network (chip tile size on disk).
  chip_width = 1024
  chip_width_step = 896

  chip_height = 1024
  chip_height_step = 896

  # Adaptive size threshold for chipping
  chip_adaptive_thresh = 1600000

  # Keep small boxes: high-res training exists to learn small objects.
  min_train_box_length = 1

  # Write chips as JPEG: PNG tiles for the full set overflow the disk (~700GB).
  chip_format = jpg

  # Only emit tiles with an annotation (object or hard negative).
  chips_w_gt_only = true

  # Plus ~10% random background tiles, relative to annotated tiles.
  background_chip_ratio = 0.10

  # Reuse cached tiles on re-runs. Manifests now persist polygons too, so a
  # re-run keeps masks. (Cache was cleared for this run; regenerated fresh.)
  reuse_cache = true

  # Parallel chip generation (the 4-GPU job allocates 16 CPUs).
  chip_threads = 12

  # Image reader type
  image_reader:type = ocv

endblock

block detector_trainer:ocv_windowed:trainer

  # Trainer type
  type = rf_detr

  # The model variant (base, large, small, medium, nano)
  rf_detr:model_size = large

  # Train the segmentation (mask) head: RFDETRSegLarge.
  rf_detr:segmentation = true

  # Off for seg: jittering the resolution up raises peak memory and risks OOM
  # with the mask head at 1008px on 24 GB GPUs. Train at a fixed resolution.
  rf_detr:multi_scale = False

  # Device to train on (auto, cpu, cuda, cuda:N)
  rf_detr:device = auto

  # Use all 4 GPUs with DDP (subprocess launcher). strategy defaults to
  # ddp_find_unused_parameters_true.
  rf_detr:devices = 4

  # Network input resolution. Must be divisible by 24 for seg-large; 1008 keeps
  # it close to the 1024 chip size (small resize) while staying high-res.
  rf_detr:resolution = 1008

  # Off: batch 1 + the mask-instance cap fits in ~16 GB of the 24 GB GPUs with
  # room to spare, and skipping activation recompute is ~33%% faster per step.
  # Set True only if a denser dataset / higher resolution OOMs.
  rf_detr:gradient_checkpointing = False

  # Path to pretrained weights (empty -> RFDETRSegLarge published weights)
  rf_detr:seed_model =

  # Fixed micro-batch (NOT auto) so every DDP rank takes the same number of
  # steps. 1 x grad_accum 4 x 4 GPUs = global effective batch 16.
  rf_detr:batch_size = 1
  rf_detr:grad_accum_steps = 4
  rf_detr:max_epochs = 50

  # Cosine LR anneal + early stopping (the last run kept a constant LR and
  # overfit at epoch 6; this anneals and stops when val mAP plateaus).
  rf_detr:lr_scheduler = cosine
  rf_detr:warmup_epochs = 1.0
  rf_detr:early_stopping = True
  rf_detr:early_stopping_patience = 8

  # Training learning rate
  rf_detr:learning_rate = 1e-4
  rf_detr:learning_rate_encoder = 1.5e-4

  # EMA settings
  rf_detr:use_ema = True
  rf_detr:ema_decay = 0.993

  # Checkpointing
  rf_detr:checkpoint_interval = 10

  # Max timeout in seconds (default = 1209600, or two weeks)
  rf_detr:timeout = 1209600

endblock
