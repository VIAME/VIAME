# =============================================================================
# Title: Train Detector - RF DETR Large 1728x960 All-Motion (no RGB)
#
# Description: Configuration for training an RF-DETR large detector on motion
# alone. The RGB image is discarded entirely and replaced with a 3-channel stack
# of motion representations (train_aug_all_motion -> [ flow_magnitude,
# frame_difference, temporal_variance ]); see that pipeline for what each channel
# measures and why all three are undirected.
#
# The premise is that for small camouflaged fish, appearance is close to
# worthless -- that is what camouflage means -- while motion is not. The 4-channel
# optical-flow config bolts one motion channel onto RGB and lets the network
# decide how much to weight it; this one removes the choice. The trade is that a
# motionless fish is invisible to this model, so its recall ceiling is set by how
# often fish move relative to the background within the temporal baselines above.
# It is meant to be compared against the RGB and RGB+flow configs, not to replace
# them outright: the natural end state is an ensemble or a two-stream model.
#
# Because the input is 3-channel, the COCO-pretrained stem loads completely
# unmodified -- no channel tiling, no 3/4 rescale of the pretrained kernels, and
# the standard ImageNet normalization applies. This config gets a cleaner start
# from pretrained weights than the 4-channel one does, even though its input is
# further from natural imagery.
#
# Sized for a ~49 GB GPU: micro-batch 8, no gradient accumulation, with AMP (on
# by default). Note batch_size is PER-DEVICE and the LR is not scaled by world
# size, so the global batch on a 4-GPU node is 32 -- see the batch_size block.
# The network input is 1728x960 (height 960, width 1728): a near-16:9 shape that
# preserves the aspect ratio of the source footage instead of squashing it into a
# square. Both dims are divisible by the large model's patch_size*num_windows = 32
# constraint (54 x 30 blocks).
#
# Requires temporally ordered input frames.
# =============================================================================

include common_train_detector.conf

#  Pipeline template file.
relativepath pipeline_template = templates/embedded_rf_detr_all_motion.pipe

#  Override default validation percentage. Frames from video are highly
#  redundant, so a large split buys no extra signal -- it just removes training
#  data.
default_percent_validation = 0.10

#  Longer validation bursts than the shared default: this corpus is hundreds of
#  thousands of video frames, so it is far above the small-corpus floor that caps
#  the default, and 500 frames (~17s at 30fps) decorrelates each burst from the
#  training footage around it. At the default of 10 the validation set is
#  10-frame slivers lifted out of the training footage every ~3 seconds, each
#  flanked by near-duplicates, and the resulting scores measure memorization.
validation_burst_frame_count = 500

#  Augmentation pipeline. Single-pass and source-driven: it reads from the
#  common_default_input source, so the same pipeline handles videos (decoded once,
#  frames extracted and motion-stacked in one pass) and image sequences.
relativepath augmentation_pipeline = train_aug_all_motion.pipe

#  Augmentation cache.
augmentation_cache = augmented_images

#  Regenerate the cache if it already exists. The motion channels here differ from
#  every other config's, so a cache built by another config must NOT be reused --
#  keep this true unless the cache is known to have come from this pipeline.
regenerate_cache = true


#  Algorithm to use for 'detector_trainer'.
detector_trainer:type = ocv_windowed

block detector_trainer:ocv_windowed

  # Directory for all files used in training
  train_directory = deep_training

  # Windowing mode, can be disabled, maintain_ar, scale, chip, adaptive
  mode = disabled

  # Chip geometry, unused while mode = disabled (the full frame is passed through
  # and RF-DETR does the resize). Kept aligned with the network input shape.
  chip_width = 1728
  chip_width_step = 1152

  chip_height = 960
  chip_height_step = 640

  # Adaptive size threshold for chipping
  chip_adaptive_thresh = 1600000

  # Keep small boxes -- small fish are the target, so do not filter or remove
  # small detections during training.
  min_train_box_length = 1

  # Image reader type
  image_reader:type = vxl

endblock

block detector_trainer:ocv_windowed:trainer

  # Trainer type
  type = rf_detr

  # The model variant (base, large, small, medium, nano)
  rf_detr:model_size = large

  # Device to train on (auto, cpu, cuda, cuda:N)
  rf_detr:device = auto

  # Three motion channels, no RGB. At 3 channels RF-DETR's _adapt_input_conv
  # returns the pretrained patch-embed weight unchanged, so unlike the 4-channel
  # configs there is no stem surgery at all.
  rf_detr:num_channels = 3

  # Network input resolution, as HEIGHTxWIDTH. Both dims must be divisible by 32
  # for the large model.
  rf_detr:resolution = 960x1728

  # Augmentation preset for the all-motion layout.
  #
  # Geometry (horizontal flip, mild affine) applies to every channel, which is safe
  # because all three are undirected. No vertical flip: up is up in this footage.
  #
  # There is no appearance channel here, so there is nothing to apply brightness or
  # contrast to -- and doing so to a motion channel would lift stationary background
  # off true zero, inventing motion.
  #
  # All three channels do get a multiplicative gain jitter (+/-30%, clipped at 255),
  # sharing one factor so the ratios between the three operators are preserved.
  # 0 * k == 0, so the background stays exactly zero. It buys invariance to the
  # absolute motion scale, which is set by the flow scale and the byte scale_factors
  # rather than by the fish.
  rf_detr:augmentation = motion_only

  # Path to seed weights. Leave empty to fine-tune from RF-DETR's default
  # COCO-pretrained weights. Worth revisiting for this config specifically: the
  # input is further from natural imagery than RGB is, so the usual assumption
  # that COCO features transfer is weaker here. If it underperforms, seeding from
  # the trained RGB or RGB+flow model is the next thing to try.
  rf_detr:seed_model =

  # BOTH of these are PER-DEVICE, and the learning rate is never scaled by world
  # size, so the global batch the LR actually sees is
  #     batch_size * grad_accum_steps * num_gpus
  # On the 4-GPU node that is 8 * 1 * 4 = 32. grad_accum is 1 deliberately: with
  # accumulation the optimizer-step count per epoch collapses, and step count is
  # what this model is short of, not batch size.
  rf_detr:batch_size = 8
  rf_detr:grad_accum_steps = 1

  # Matches the optical-flow config so the two runs are comparable. The 1728 flow
  # run converged by epoch 3 and bounced thereafter; 18 epochs is past the point
  # where the corpus yields anything new and short enough that cosine actually
  # reaches the bottom of its anneal.
  rf_detr:max_epochs = 18

  # Scaled from RF-DETR's tuned 1e-4/1.5e-4 (which assume a global batch of 16)
  # to the global batch of 32 above. sqrt scaling, not linear: DETR training is
  # unstable at high LR.
  rf_detr:learning_rate = 1.5e-4
  rf_detr:learning_rate_encoder = 2e-4

  # The head is re-initialized to a single class, and the input distribution is
  # far from what the backbone was pretrained on, so ramp in rather than starting
  # at full LR.
  rf_detr:warmup_epochs = 0.25

  # Cosine anneals across max_epochs. The default "step" schedule drops at
  # lr_drop = 100, which never fires in a run this length.
  rf_detr:lr_scheduler = cosine

  # EMA decay is applied per optimizer step, so the averaging horizon is
  # ~1/(1-decay) steps. The old default of 0.993 averaged over ~140 steps, well
  # under 1% of an epoch here.
  rf_detr:use_ema = True
  rf_detr:ema_decay = 0.9998

  # Checkpointing
  rf_detr:checkpoint_interval = 5

  # Host-memory budget. Every DDP rank forks num_workers DataLoader workers, and
  # each worker holds prefetch_factor * batch_size decoded images. On a 4-GPU node
  # that is 4 * num_workers worker processes live at once, which is what exhausts
  # host RAM (the rank is SIGKILLed, not a CUDA OOM). Keep persistent_workers off
  # so the validation workers are reaped between epochs.
  rf_detr:num_workers = 4
  rf_detr:pin_memory = True
  rf_detr:persistent_workers = False
  rf_detr:prefetch_factor = 2

  # Bound validation. Even at default_percent_validation = 0.10 a large corpus
  # yields a six-figure validation set, and the COCO evaluator holds up to
  # eval_max_dets detections per image in host RAM before accumulating. A
  # deterministic subsample gives the same model-selection signal at a fixed cost;
  # run a full eval on the final best checkpoint for a headline number.
  rf_detr:val_subsample = 4000
  rf_detr:eval_max_dets = 300

  # Max timeout in seconds (default = 1209600, or two weeks)
  rf_detr:timeout = 1209600

endblock
