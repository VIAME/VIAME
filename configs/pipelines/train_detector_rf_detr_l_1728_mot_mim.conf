# =============================================================================
# Title: Train Detector - RF DETR Large 1728x960 Motion (MIM)
#
# Description: Configuration for training RF-DETR with motion-image-method (MIM)
# infusion. Uses the RF-DETR large model at 1728x960 -- the large variant's high-
# resolution feature scale (P3) and larger input aid small-object recall, and
# the bump from 728 to 1728x960 resolves smaller fish on high-resolution imagery.
# Training imagery is augmented with two temporal-variance motion channels
# (train_aug_add_double_motion) and the detector is deployed with the matching
# motion-infusion template. Small boxes are retained for small-fish detection.
# Requires temporally ordered input frames.
#
# For video inputs the frames are extracted and motion-augmented in a single
# pass (train_aug_add_double_motion) so the video is decoded only once and
# only the augmented images are written to disk.
#
# Sized for a ~49 GB GPU: micro-batch 8, no gradient accumulation, with AMP (on
# by default). Note batch_size is PER-DEVICE and the LR is not scaled by world
# size, so the global batch on a 4-GPU node is 32 -- see the batch_size block.
# The network input is 1728x960 (height 960, width 1728): a
# near-16:9 shape that preserves the aspect ratio of the source footage instead
# of squashing it into a square. It costs the same 1.66M pixels as a 1280x1280
# square, but spends them on real horizontal detail (0.90x downsample from
# 1080p, vs 0.667x for the square) rather than on interpolating the vertical
# axis. Both dims are divisible by the large model's patch_size*num_windows = 32
# constraint (54 x 30 blocks).
# =============================================================================

include common_train_detector.conf

#  Pipeline template file.
relativepath pipeline_template = templates/embedded_rf_detr_motion.pipe

#  Override default validation percentage
default_percent_validation = 0.10

#  Longer validation bursts than the shared default: this corpus is hundreds of
#  thousands of video frames, so it is far above the small-corpus floor that caps
#  the default, and 500 frames (~17s at 30fps) decorrelates each burst from the
#  training footage around it.
validation_burst_frame_count = 500

#  Augmentation pipeline. This is a single-pass, source-driven pipeline: it
#  reads from the common_default_input source, so the same pipeline augments
#  both videos (decoded once, frames extracted and motion-augmented in one pass)
#  and image sequences (via the image_list reader). No separate video-extraction
#  or per-frame augmentation pass is needed.
relativepath augmentation_pipeline = train_aug_add_double_motion.pipe

#  Augmentatation cache.
augmentation_cache = augmented_images

#  Do not regenerate cache.
regenerate_cache = true


#  Algorithm to use for 'detector_trainer'.
detector_trainer:type = ocv_windowed

block detector_trainer:ocv_windowed

  # Directory for all files used in training
  train_directory = deep_training

  # Windowing mode, can be disabled, maintain_ar, scale, chip, adaptive
  mode = disabled

  # Chip geometry, unused while mode = disabled (the full frame is passed through
  # and RF-DETR does the resize). Kept aligned with the network input shape.
  chip_width = 1728
  chip_width_step = 1152

  chip_height = 960
  chip_height_step = 640

  # Adaptive size threshold for chipping
  chip_adaptive_thresh = 1600000

  # Keep small boxes -- small fish are the target, so do not filter or remove
  # small detections during training.
  min_train_box_length = 1
  #small_box_area = 200
  #small_action = remove

  # Image reader type
  image_reader:type = vxl

endblock

block detector_trainer:ocv_windowed:trainer

  # Trainer type
  type = rf_detr

  # The model variant (base, large, small, medium, nano)
  rf_detr:model_size = large

  # Device to train on (auto, cpu, cuda, cuda:N)
  rf_detr:device = auto

  # Network input resolution, as HEIGHTxWIDTH. Both dims must be divisible by 32
  # for the large model. A non-square value feeds the network aspect-preserving
  # imagery; RF-DETR resizes to exactly this shape (no windowing, no black bars).
  rf_detr:resolution = 960x1728

  # Augmentation preset for the [ motion, grey, motion ] layout.
  #
  # Geometry (horizontal flip, mild affine) applies to all three channels. No
  # vertical flip: up is up in this footage.
  #
  # Brightness, contrast and gamma apply to the CENTRE channel only -- it is the one
  # appearance channel here. The two variance channels are excluded: an additive
  # offset on a motion-energy channel lifts stationary background off true zero and
  # invents motion. No colour ops, since saturation and hue are undefined on a single
  # channel.
  #
  # The two variance channels instead get a multiplicative gain jitter (+/-30%,
  # clipped at 255), sharing one factor so the ratio between the two temporal scales
  # is preserved. 0 * k == 0, so the background stays exactly zero.
  rf_detr:augmentation = motion_grey

  # Path to seed weights. Leave empty to fine-tune from RF-DETR's default
  # COCO-pretrained weights -- these transfer well even though the motion
  # channels are not true RGB, and beat training from scratch.
  rf_detr:seed_model =

  # BOTH of these are PER-DEVICE, and the learning rate is never scaled by world
  # size, so the global batch the LR actually sees is
  #     batch_size * grad_accum_steps * num_gpus
  # On the 4-GPU node that is 8 * 1 * 4 = 32. grad_accum is 1 deliberately: with
  # accumulation the optimizer-step count per epoch collapses, and step count is
  # what this model is short of, not batch size.
  #
  # Micro-batch is sized against the multi_scale peak (1088x1952, 1.28x the
  # 960x1728 base -- that shape, not the base, is where VRAM peaks). Training-step
  # memory is quadratic in micro-batch because the matcher/loss cost matrices scale
  # with objects-per-frame. Drop to 4 for a 24 GB GPU, and rescale the LR if you
  # change any of the three factors above.
  rf_detr:batch_size = 8
  rf_detr:grad_accum_steps = 1

  # Matched to the optical-flow and all-motion configs so the three runs differ only
  # in their channels, not in their tuning. Deliberately short for a fast first pass;
  # cosine anneals to 0 across it. Revisit once the augmented curve is in hand.
  rf_detr:max_epochs = 20

  # Scaled from RF-DETR's tuned 1e-4/1.5e-4 (which assume a global batch of 16) to
  # the global batch of 32 above. sqrt scaling, not linear: DETR training is unstable
  # at high LR.
  rf_detr:learning_rate = 1.5e-4
  rf_detr:learning_rate_encoder = 2e-4

  # The head is re-initialized to a single class, so the first few hundred steps push
  # large gradients through a mostly-pretrained network. Ramp in.
  rf_detr:warmup_epochs = 0.25

  # LR schedule. The default "step" schedule drops at lr_drop = 100, which never
  # fires in a run this length. Cosine anneals to 0 across max_epochs.
  rf_detr:lr_scheduler = cosine

  # EMA decay is applied per optimizer step, so the averaging horizon is ~1/(1-decay)
  # steps. The old 0.993 averaged over ~140 steps, well under 1% of an epoch here.
  rf_detr:use_ema = True
  rf_detr:ema_decay = 0.9998

  # Checkpointing
  rf_detr:checkpoint_interval = 5

  # Host-memory budget. Every DDP rank forks num_workers DataLoader workers, and
  # each worker holds prefetch_factor * batch_size decoded images. On a 4-GPU
  # node that is 4 * num_workers worker processes live at once, which is what
  # exhausts host RAM (the rank is SIGKILLed, not a CUDA OOM). Keep
  # persistent_workers off so the validation workers are reaped between epochs.
  rf_detr:num_workers = 4
  rf_detr:pin_memory = True
  rf_detr:persistent_workers = False
  rf_detr:prefetch_factor = 2

  # Bound validation. Even at default_percent_validation = 0.10 a large corpus yields
  # a six-figure validation set, and the COCO evaluator holds up to eval_max_dets
  # detections per image in host RAM before accumulating. A deterministic
  # subsample gives the same model-selection signal at a fixed cost; run a full
  # eval on the final best checkpoint for a headline number.
  rf_detr:val_subsample = 4000
  rf_detr:eval_max_dets = 300

  # Max timeout in seconds (default = 1209600, or two weeks)
  rf_detr:timeout = 1209600

endblock
