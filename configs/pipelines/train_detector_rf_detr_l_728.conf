# =============================================================================
# Title: Train Detector - RF DETR Large 728
#
# Description: Trains the RF-DETR large model at 728px with adaptive windowing:
# frames larger than chip_adaptive_thresh are tiled into 728px chips (preserving
# small-object resolution on high-res/video footage), smaller frames pass whole.
# Video clips are decoded to frames up front, concurrently across
# augmentation_threads workers.
# =============================================================================

include common_train_detector.conf

#  Pipeline template file.
relativepath pipeline_template = templates/embedded_default.pipe

#  Override default validation percentage
default_percent_validation = 0.10

#  Augmentation pipeline.
#relativepath augmentation_pipeline = train_hue_shifting_only_aug.pipe

#  Augmentatation cache.
augmentation_cache = augmented_images

#  Regenerate the cache (decode video frames + rebuild chips).
regenerate_cache = true

#  Worker threads for the concurrent video-frame extraction pass.
augmentation_threads = 16


#  Algorithm to use for 'detector_trainer'.
detector_trainer:type = ocv_windowed

block detector_trainer:ocv_windowed

  # Directory for all files used in training
  train_directory = deep_training

  # Windowing mode, can be disabled, maintain_ar, scale, chip, adaptive
  mode = adaptive

  # Serial chip generation (1 worker). Safe default; can be raised now that the
  # writer is OpenCV rather than vxl.
  chip_threads = 1

  # Resized chip width (RF-DETR large default is 728). NOTE: the code reads
  # chip_step_width / chip_step_height (the older chip_width_step /
  # chip_height_step keys were silently ignored and defaulted to 500).
  chip_width = 728
  chip_step_width = 485

  # Resized chip height (RF-DETR large default is 728).
  chip_height = 728
  chip_step_height = 485

  # Adaptive size threshold for chipping
  chip_adaptive_thresh = 1600000

  # Don't train on chips with detections smaller than this
  min_train_box_length = 5

  # Uncomment to remove small detections instead of training on them
  small_box_area = 200
  small_action = remove

  # Image IO type. ocv, not vxl: the vxl writer corrupts the heap over long
  # runs (crashing chip generation and video-frame extraction).
  image_reader:type = ocv

endblock

block detector_trainer:ocv_windowed:trainer

  # Trainer type
  type = rf_detr

  # The model variant (base, large, small, medium, nano)
  rf_detr:model_size = large

  # Device to train on (auto, cpu, cuda, cuda:N)
  rf_detr:device = auto

  # Network perspective field size
  rf_detr:chip_width = 728

  # Path to pretrained weights
  rf_detr:seed_model =

  #  Pipeline template file.
  #relativepath rf_detr:pipeline_template = templates/embedded_default.pipe

  # Image train batch size
  rf_detr:batch_size = 4
  rf_detr:max_epochs = 20

  # Training learning rate
  rf_detr:learning_rate = 1e-4
  rf_detr:learning_rate_encoder = 1.5e-4

  # The head is re-initialized to the new class count, so the first few hundred
  # steps push large gradients through an otherwise-pretrained network. Ramp in.
  rf_detr:warmup_epochs = 0.25

  # LR schedule. Without this the trainer falls back to "step", which drops the LR
  # once at lr_drop = 100 -- an epoch this run never reaches, so the LR would hold
  # at its peak from the first step to the last and never anneal. Cosine decays
  # smoothly to 0 across max_epochs, whatever max_epochs happens to be.
  rf_detr:lr_scheduler = cosine

  # Gradient accumulation steps
  rf_detr:grad_accum_steps = 4

  # EMA settings
  rf_detr:use_ema = True
  rf_detr:ema_decay = 0.993

  # Checkpointing
  rf_detr:checkpoint_interval = 10

  # Max timeout in seconds (default = 1209600, or two weeks)
  rf_detr:timeout = 1209600

endblock
