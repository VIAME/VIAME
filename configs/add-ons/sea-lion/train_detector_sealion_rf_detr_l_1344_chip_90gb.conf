# =============================================================================
# Title: Train Detector - RF DETR Seg Large (masks), 1344px chips, 4-GPU DDP,
#        tuned for high-VRAM GPUs (~90 GB each, e.g. 4x H100/A100-80G+).
#
# Variant of train_detector_sealion_rf_detr_l_1024_chip.conf for GPUs with far
# more VRAM than the 24 GB RTX6000s the base config targets. The base config's
# memory compromises are relaxed here:
#   * max_mask_instances 64 -> 256  : the mask loss can see far more instances
#                                     per dense colony chip (the 64 cap was the
#                                     single biggest 24 GB workaround -> accuracy).
#   * multi_scale False -> True      : scale-jitter augmentation (helps varied
#                                     altitude/scale aerial imagery).
#   * batch_size 1 -> 2 (real)       : seg validation is pinned to batch 1 in the
#                                     RF-DETR datamodule, so training can batch >1
#                                     independently. 2 x grad_accum 2 x 4 = eff 16
#                                     (same effective batch as base, so LR stays).
#   * resolution/chip 1008/1024 -> 1344 : more native-resolution detail/context
#                                     per tile, better on small/dense objects
#                                     (pups). 1344 = 24*56 (seg-large needs /24).
#
# IMPORTANT — verify on the target hardware before a multi-day run:
#   * batch_size > 1 for seg REQUIRES the val-batch-1 fix in
#     rfdetr/training/module_data.py (val_dataloader pins batch 1 when
#     segmentation_head). That fix is in the tree; confirm it's installed.
#   * These values are an aggressive starting point sized for ~90 GB. The peak is
#     on the densest chips with multi_scale jittered up. If it OOMs, dial back in
#     this order: (1) multi_scale=False, (2) max_mask_instances=128,
#     (3) batch_size=1/grad_accum_steps=4, (4) resolution+chip back to 1008/1024.
#     To trade compute for memory instead, set gradient_checkpointing=True.
#   * resolution/chip 1344 needs a fresh chip cache (clear deep_training first).
# =============================================================================

include common_train_detector.conf

relativepath pipeline_template = templates/embedded_default.pipe
default_percent_validation = 0.30
augmentation_cache = augmented_images
regenerate_cache = true
hard_negative_categories = negative

detector_trainer:type = ocv_windowed

block detector_trainer:ocv_windowed

  train_directory = deep_training
  mode = chip

  # Larger native-resolution tiles (more context/detail per chip). Step keeps
  # ~the base 87.5% ratio (192px overlap).
  chip_width = 1344
  chip_width_step = 1176
  chip_height = 1344
  chip_height_step = 1176
  chip_adaptive_thresh = 2800000

  min_train_box_length = 1
  chip_format = jpg
  chips_w_gt_only = true
  background_chip_ratio = 0.10
  reuse_cache = true
  chip_threads = 12
  image_reader:type = ocv

endblock

block detector_trainer:ocv_windowed:trainer

  type = rf_detr
  rf_detr:model_size = large
  rf_detr:segmentation = true

  # On: scale-jitter augmentation (memory headroom at 90 GB).
  rf_detr:multi_scale = True

  rf_detr:device = auto
  rf_detr:devices = 4

  # Higher native resolution; must be divisible by 24 for seg-large (1344=24*56).
  rf_detr:resolution = 1344

  # Off (faster); set True to reclaim memory for a bigger batch if needed.
  rf_detr:gradient_checkpointing = False

  # Empty -> RFDETRSegLarge published (COCO-pretrained) weights.
  rf_detr:seed_model =

  # Real micro-batch 2 (validation stays batch 1 for seg via the datamodule fix).
  # 2 x grad_accum 2 x 4 GPUs = global effective batch 16 (LR tuned for this).
  rf_detr:batch_size = 2
  rf_detr:grad_accum_steps = 2
  rf_detr:max_epochs = 50

  # Mask-loss instance cap raised 64 -> 256: dense colony chips contribute far
  # more mask supervision. Raise further (or remove) if memory allows.
  rf_detr:max_mask_instances = 256

  # DataLoader throughput. Raise num_workers if the box has more CPU cores.
  rf_detr:num_workers = 4
  rf_detr:pin_memory = True
  rf_detr:persistent_workers = True
  rf_detr:prefetch_factor = 4

  rf_detr:val_subsample = 4000
  rf_detr:eval_interval = 1
  rf_detr:eval_max_dets = 300

  # Stepped LR decay (10x every lr_drop epochs) + early stopping.
  rf_detr:lr_scheduler = multistep
  rf_detr:lr_drop = 4
  rf_detr:warmup_epochs = 1.0
  rf_detr:early_stopping = True
  rf_detr:early_stopping_patience = 8

  rf_detr:learning_rate = 1e-4
  rf_detr:learning_rate_encoder = 1.5e-4

  rf_detr:use_ema = True
  rf_detr:ema_decay = 0.993
  rf_detr:checkpoint_interval = 10
  rf_detr:timeout = 1209600

endblock
