# =============================================================================
# Title: Train Detector - RF DETR Large 1280
#
# Description: Tiny-object escalation of the 1024px config. Trains the RF-DETR
# large model at a 1280px input resolution (80x80 detection grid) to resolve
# the smallest objects on high-resolution imagery without gridding/tiling. The
# same large seed weights and architecture are reused; the pretrained
# positional embeddings are bicubic-interpolated from the 44x44 grid to the
# 80x80 grid at build time.
#
# 1280 exceeds what a 24 GB GPU fits at a normal batch, so gradient
# checkpointing is enabled (~30% slower, roughly halves activation memory).
# 1280 is divisible by the large model's patch_size*num_windows = 32
# constraint. Use this only if the 1024 config still misses the smallest
# objects; otherwise prefer the cheaper 1024 config.
# =============================================================================

include common_train_detector.conf

#  Pipeline template file.
relativepath pipeline_template = templates/embedded_default.pipe

#  Override default validation percentage
default_percent_validation = 0.10

#  Augmentatation cache.
augmentation_cache = augmented_images

#  Do not regenerate cache.
regenerate_cache = true


#  Algorithm to use for 'detector_trainer'.
detector_trainer:type = ocv_windowed

block detector_trainer:ocv_windowed

  # Directory for all files used in training
  train_directory = deep_training

  # Windowing mode, can be disabled, maintain_ar, scale, chip, adaptive
  mode = disabled

  # Resized image fed to the network (matches the 1280px network resolution).
  chip_width = 1280
  chip_width_step = 853

  # Resized image fed to the network (matches the 1280px network resolution).
  chip_height = 1280
  chip_height_step = 853

  # Adaptive size threshold for chipping
  chip_adaptive_thresh = 1600000

  # Keep small boxes: high-res training exists to learn small objects.
  min_train_box_length = 1

  # Image reader type
  image_reader:type = vxl

endblock

block detector_trainer:ocv_windowed:trainer

  # Trainer type
  type = rf_detr

  # The model variant (base, large, small, medium, nano)
  rf_detr:model_size = large

  # Multi-scale training: jitter the input resolution each step so the model
  # generalizes across object scales, big and small.
  rf_detr:multi_scale = True

  # Device to train on (auto, cpu, cuda, cuda:N)
  rf_detr:device = auto

  # Network input resolution (must be divisible by 32 for the large model).
  rf_detr:resolution = 1280

  # Network perspective field size
  rf_detr:chip_width = 1280

  # Required at 1280 on 24 GB: recompute backbone activations in the backward
  # pass to fit in VRAM (~30% slower, roughly halves activation memory).
  rf_detr:gradient_checkpointing = True

  # Path to pretrained weights
  rf_detr:seed_model =

  #  Pipeline template file.
  #relativepath rf_detr:pipeline_template = templates/embedded_default.pipe

  # Effective batch = batch_size * grad_accum_steps = 16. Micro-batch 1 keeps
  # peak memory under 24 GB at 1280px with AMP + gradient checkpointing. Set
  # batch_size = auto to let RF-DETR probe for the largest micro-batch that
  # fits and derive grad_accum to hit auto_batch_target_effective (default 16).
  rf_detr:batch_size = 1
  rf_detr:grad_accum_steps = 16
  #rf_detr:auto_batch_target_effective = 16
  rf_detr:max_epochs = 50

  # Training learning rate
  rf_detr:learning_rate = 1e-4
  rf_detr:learning_rate_encoder = 1.5e-4

  # EMA settings
  rf_detr:use_ema = True
  rf_detr:ema_decay = 0.993

  # Checkpointing
  rf_detr:checkpoint_interval = 10

  # Max timeout in seconds (default = 1209600, or two weeks)
  rf_detr:timeout = 1209600

endblock
