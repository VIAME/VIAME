# =============================================================================
# Title: Train Detector - RF DETR Large 1024
#
# Description: Trains the RF-DETR large model at a 1024px input resolution
# (up from the 704px default) to resolve small objects on high-resolution
# imagery without gridding/tiling. The same large seed weights and
# architecture are reused; the pretrained positional embeddings are
# bicubic-interpolated from the 44x44 grid to the 64x64 grid at build time.
#
# Sized for a single 24 GB GPU: micro-batch 2 + grad_accum 8 (effective 16)
# with AMP (on by default). 1024 is divisible by the large model's
# patch_size*num_windows = 32 constraint. To push higher (1152/1280) or raise
# the micro-batch, set rf_detr:gradient_checkpointing = True.
# =============================================================================

include common_train_detector.conf

#  Pipeline template file.
relativepath pipeline_template = templates/embedded_default.pipe

#  Override default validation percentage
default_percent_validation = 0.10

#  Augmentatation cache.
augmentation_cache = augmented_images

#  Do not regenerate cache.
regenerate_cache = true


#  Algorithm to use for 'detector_trainer'.
detector_trainer:type = ocv_windowed

block detector_trainer:ocv_windowed

  # Directory for all files used in training
  train_directory = deep_training

  # Windowing mode, can be disabled, maintain_ar, scale, chip, adaptive
  mode = disabled

  # Resized image fed to the network (matches the 1024px network resolution).
  chip_width = 1024
  chip_width_step = 683

  # Resized image fed to the network (matches the 1024px network resolution).
  chip_height = 1024
  chip_height_step = 683

  # Adaptive size threshold for chipping
  chip_adaptive_thresh = 1600000

  # Keep small boxes: high-res training exists to learn small objects.
  min_train_box_length = 1

  # Image reader type
  image_reader:type = vxl

endblock

block detector_trainer:ocv_windowed:trainer

  # Trainer type
  type = rf_detr

  # The model variant (base, large, small, medium, nano)
  rf_detr:model_size = large

  # Multi-scale training: jitter the input resolution each step (~864-1184px
  # at 1024) so the model generalizes across object scales, big and small.
  rf_detr:multi_scale = True

  # Device to train on (auto, cpu, cuda, cuda:N)
  rf_detr:device = auto

  # Network input resolution (must be divisible by 32 for the large model).
  rf_detr:resolution = 1024

  # Network perspective field size
  rf_detr:chip_width = 1024

  # Recompute backbone activations in the backward pass to save VRAM. Off by
  # default; enable to reach 1152/1280 or a larger micro-batch on 24 GB.
  rf_detr:gradient_checkpointing = False

  # Path to pretrained weights
  rf_detr:seed_model =

  #  Pipeline template file.
  #relativepath rf_detr:pipeline_template = templates/embedded_default.pipe

  # Effective batch = batch_size * grad_accum_steps = 16. Micro-batch 2 keeps
  # peak memory under 24 GB at 1024px with AMP. Set batch_size = auto to let
  # RF-DETR probe for the largest micro-batch that fits and derive grad_accum
  # to hit auto_batch_target_effective (default 16).
  rf_detr:batch_size = 2
  rf_detr:grad_accum_steps = 8
  #rf_detr:auto_batch_target_effective = 16
  rf_detr:max_epochs = 50

  # Training learning rate
  rf_detr:learning_rate = 1e-4
  rf_detr:learning_rate_encoder = 1.5e-4

  # The head is re-initialized to the new class count, so the first few hundred
  # steps push large gradients through an otherwise-pretrained network. Ramp in.
  rf_detr:warmup_epochs = 0.25

  # LR schedule. Without this the trainer falls back to "step", which drops the LR
  # once at lr_drop = 100 -- an epoch this run never reaches, so the LR would hold
  # at its peak from the first step to the last and never anneal. Cosine decays
  # smoothly to 0 across max_epochs, whatever max_epochs happens to be.
  rf_detr:lr_scheduler = cosine

  # EMA settings
  rf_detr:use_ema = True
  rf_detr:ema_decay = 0.993

  # Checkpointing
  rf_detr:checkpoint_interval = 10

  # Max timeout in seconds (default = 1209600, or two weeks)
  rf_detr:timeout = 1209600

endblock
